;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_
;; PolyBar config.ini Global WM Settings
;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[global/wm]
margin-bottom = 0
margin-top = 0

include-file = ./system.ini
include-file = ./colors.ini
include-file = ./modules.ini

[bar/main]
monitor = ${env:MONITOR:}
monitor-fallback =
monitor-strict = false
override-redirect = true

bottom = false
fixed-center = true

width = 100%
height = 26
offset-x = 0%
offset-y = 0%

background = ${color.BACKGROUND}
foreground = ${color.FOREGROUND}

radius-top = 0.0
radius-bottom = 0.0

line-size = 2
line-color = ${color.ACCENT}

border-size = 6
border-color = ${color.BACKGROUND}

padding = 0
module-margin-left = 0
module-margin-right = 0

font-0 = "JetBrains Mono:size=10;3"
font-1 = "Symbols Nerd Font:size=12;3"
font-2 = "Symbols Nerd Font:size=20;4"
font-3 = "Symbols Nerd Font:size=10;4"
font-4 = "Iosevka:style=bold:size=10;4"
font-5 = "archcraft:size=12;3"
font-6 = "SymbolsNF:size=12;3"

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_
;; Available Modules
;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_
;; sep - simple space separator 
;; dot - dull grey dot separator
;; dot-alt - bright grey dot separator
;; LD - left side dark grey moon
;; RD - right side dark grey moon
;; backlight - display backlight module (brightnessctl)
;; battery - battery monitor module
;; bluetooth - bluetooth monitor module
;; brightnessctl - display brightnessctl module
;; cpu - cpu monitor module
;; date - date and time module
;; ethernet - ethernet connections module
;; filesystem - filesystem monitor module
;; keyboard - current keyboard layout module
;; memory - memory module
;; menu - rofi menu module
;; mpd - music player module
;; openbox - workspaces module
;; song - music playing module
;; sysmenu - powermenu module
;; temperature
;; title - title of window with focus
;; tray
;; used-memory - used-memory monitor module
;; volume - volume module
;; wireless - wireless connections module

modules-left = LD menu RD LD openbox RD
modules-center = LD date RD LD mpd RD sep song
modules-right = volume brightnessctl bluetooth ethernet wireless LD battery sysmenu RD

separator =
spacing = 0

dim-value = 1.0

wm-name = 
locale = 

wm-restack = bspwm

enable-ipc = true

cursor-click = 
cursor-scroll = 

; bspwm
;;scroll-up = bspc desktop -f prev.local
;;scroll-down = bspc desktop -f next.local

[settings]
;throttle-output = 5
;throttle-output-for = 10
;throttle-input-for = 30

screenchange-reload = true

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

pseudo-transparency = false

